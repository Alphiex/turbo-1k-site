<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Turbo1k Stream Ledger</title>
  <style>
    :root {
      --bg: #070b18;
      --panel: #0f1833;
      --panel-2: #111d3f;
      --text: #eaf0ff;
      --muted: #b7c3e9;
      --accent: #7dd4ff;
      --good: #8effbe;
      --warn: #ffd27d;
      --danger: #ff8da1;
      --border: #2b3b6b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 85% -10%, #213975 0, var(--bg) 40%);
      line-height: 1.5;
      min-height: 100vh;
    }
    .wrap { max-width: 1100px; margin: 28px auto 48px; padding: 0 16px; }
    .panel {
      background: linear-gradient(180deg, rgba(16,24,51,.96), rgba(10,16,34,.96));
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 18px 45px rgba(0,0,0,.35);
      padding: 24px;
      margin-bottom: 16px;
    }
    h1 { margin: 0 0 6px; font-size: 32px; letter-spacing: -0.5px; }
    .subtitle { color: var(--muted); margin: 0 0 14px; font-size: 14px; }
    .pill {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; letter-spacing: .5px; text-transform: uppercase;
      border: 1px solid #3a589a; color: var(--accent);
      border-radius: 999px; padding: 4px 10px;
      background: rgba(125,212,255,.08);
    }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td {
      text-align: left; padding: 12px 10px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    th {
      font-size: 11px; letter-spacing: .8px; text-transform: uppercase;
      color: var(--muted); font-weight: 600;
    }
    td.num { font-variant-numeric: tabular-nums; text-align: right; }
    th.num { text-align: right; }
    .stream-name { font-weight: 600; }
    .stream-id { color: var(--muted); font-size: 12px; }
    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 600; letter-spacing: .3px;
      border: 1px solid transparent;
    }
    .badge.active { background: rgba(142,255,190,.1); color: var(--good); border-color: rgba(142,255,190,.35); }
    .badge.killed { background: rgba(255,141,161,.1); color: var(--danger); border-color: rgba(255,141,161,.35); }
    .action {
      font-weight: 600; font-size: 13px;
      display: inline-block; padding: 4px 10px; border-radius: 8px;
    }
    .action.observing { background: rgba(125,212,255,.1); color: var(--accent); }
    .action.on-track  { background: rgba(142,255,190,.12); color: var(--good); }
    .action.at-risk   { background: rgba(255,210,125,.12); color: var(--warn); }
    .action.kill      { background: rgba(255,141,161,.12); color: var(--danger); }
    .action.keep      { background: rgba(142,255,190,.12); color: var(--good); }
    .action.killed    { background: rgba(255,141,161,.08); color: var(--danger); opacity: .8; }
    .summary-grid {
      display: grid; grid-template-columns: repeat(auto-fit,minmax(180px,1fr)); gap: 12px;
      margin-bottom: 4px;
    }
    .stat {
      background: rgba(17,29,63,.65);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
    }
    .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); }
    .stat-value { font-size: 24px; font-weight: 700; margin-top: 4px; font-variant-numeric: tabular-nums; }
    .stat-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .err { color: var(--danger); margin: 10px 0; }
    .footer { color: var(--muted); font-size: 12px; margin-top: 20px; text-align: center; }
    code { background: rgba(255,255,255,.06); padding: 2px 6px; border-radius: 4px; font-size: 12px; }
    .traj-projected { color: var(--muted); font-style: italic; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <span class="pill">Turbo1k</span>
      <h1>Stream Ledger</h1>
      <p class="subtitle" id="subtitle">Loading…</p>
      <div class="summary-grid" id="summary"></div>
    </div>
    <div class="panel">
      <div id="error" class="err" hidden></div>
      <table id="ledger-table" hidden>
        <thead>
          <tr>
            <th>Stream</th>
            <th>Status</th>
            <th class="num">MTD revenue</th>
            <th class="num">MTD hours</th>
            <th class="num">$/hr</th>
            <th class="num">30-day trajectory</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="ledger-tbody"></tbody>
      </table>
      <p class="footer">
        Update with <code>node update-ledger.js add --stream ID --date YYYY-MM-DD --income N --hours N --notes "…"</code>
      </p>
    </div>
  </div>

  <!-- Inline data shim for file:// viewing. Generated by update-ledger.js. -->
  <script src="ledger.js"></script>

  <script>
    const subtitleEl = document.getElementById('subtitle');
    const errEl = document.getElementById('error');
    const tableEl = document.getElementById('ledger-table');
    const tbodyEl = document.getElementById('ledger-tbody');
    const summaryEl = document.getElementById('summary');

    // --- Data load: try fetch (works on http/GitHub Pages); fall back to inline window.LEDGER_DATA.
    async function loadLedger() {
      try {
        const res = await fetch('./ledger.json', { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return await res.json();
      } catch (e) {
        if (window.LEDGER_DATA) return window.LEDGER_DATA;
        throw new Error(
          'Could not load ledger.json via fetch and no inline data found. ' +
          'Run a local server: `python3 -m http.server` from the tracker/ directory.'
        );
      }
    }

    // --- Date math helpers
    const today = new Date();
    const ymd = (d) => d.toISOString().slice(0, 10);
    const todayStr = ymd(today);
    const monthStart = new Date(today.getFullYear(), today.getMonth(), 1);
    const monthStartStr = ymd(monthStart);

    function daysBetween(a, b) {
      const ms = new Date(b) - new Date(a);
      return Math.max(0, Math.floor(ms / 86400000));
    }
    function fmt$(n) { return '$' + n.toFixed(2); }
    function fmtH(n) { return n.toFixed(1) + 'h'; }

    // --- Per-stream metrics
    function metricsFor(stream) {
      const entries = stream.entries || [];
      const startedStr = stream.started || (entries[0] && entries[0].date) || todayStr;
      const daysActive = daysBetween(startedStr, todayStr) + 1;

      const mtd = entries.filter((e) => e.date >= monthStartStr);
      const mtdIncome = mtd.reduce((a, e) => a + e.income_usd, 0);
      const mtdHours = mtd.reduce((a, e) => a + e.time_hours, 0);
      const dollarPerHour = mtdHours > 0 ? mtdIncome / mtdHours : null;

      // 30-day trajectory: if we have 30+ days of history, sum last 30 days literally.
      // Otherwise, scale lifetime totals by (30 / daysActive) — early projection.
      let trajectory, projected;
      if (daysActive >= 30) {
        const cutoff = new Date(today); cutoff.setDate(cutoff.getDate() - 30);
        const cutoffStr = ymd(cutoff);
        const recent = entries.filter((e) => e.date >= cutoffStr);
        trajectory = recent.reduce((a, e) => a + e.income_usd, 0);
        projected = false;
      } else {
        const total = entries.reduce((a, e) => a + e.income_usd, 0);
        trajectory = daysActive > 0 ? (total / daysActive) * 30 : 0;
        projected = true;
      }

      return { daysActive, mtdIncome, mtdHours, dollarPerHour, trajectory, projected };
    }

    // --- Pivot-rule decision
    function actionFor(stream, m) {
      if (stream.status === 'killed') {
        return { label: '💀 KILLED', cls: 'killed' };
      }
      const rule = stream.pivot_rule || { min_monthly_revenue_usd: 50, evaluate_after_days: 30 };
      const D = rule.evaluate_after_days;
      const MIN = rule.min_monthly_revenue_usd;
      if (m.daysActive < Math.floor(D / 2)) {
        return { label: '🔬 OBSERVING', cls: 'observing' };
      }
      if (m.daysActive < D) {
        if (m.trajectory < MIN / 2) return { label: '⚠️ AT RISK', cls: 'at-risk' };
        if (m.trajectory >= MIN)    return { label: '📈 ON TRACK', cls: 'on-track' };
        return { label: '🔬 OBSERVING', cls: 'observing' };
      }
      if (m.trajectory < MIN) return { label: '💀 KILL', cls: 'kill' };
      return { label: '✅ KEEP', cls: 'keep' };
    }

    // --- Tiny DOM helpers (no innerHTML — text/attributes only).
    function el(tag, attrs, ...children) {
      const node = document.createElement(tag);
      if (attrs) {
        for (const [k, v] of Object.entries(attrs)) {
          if (k === 'class') node.className = v;
          else if (k === 'text') node.textContent = v;
          else node.setAttribute(k, v);
        }
      }
      for (const c of children) {
        if (c == null || c === false) continue;
        node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
      }
      return node;
    }
    function clear(node) { while (node.firstChild) node.removeChild(node.firstChild); }

    function statTile(label, value, sub) {
      return el('div', { class: 'stat' },
        el('div', { class: 'stat-label', text: label }),
        el('div', { class: 'stat-value', text: value }),
        el('div', { class: 'stat-sub', text: sub })
      );
    }

    function render(data) {
      subtitleEl.textContent =
        `${todayStr} · ${data.streams.length} streams · ledger v${data.version || '1.0'}`;

      const active = data.streams.filter((s) => s.status === 'active');
      const killed = data.streams.filter((s) => s.status === 'killed');
      const totalMtd = data.streams.reduce((a, s) => {
        return a + (s.entries || []).filter((e) => e.date >= monthStartStr)
          .reduce((b, e) => b + e.income_usd, 0);
      }, 0);
      const totalHours = data.streams.reduce((a, s) => {
        return a + (s.entries || []).filter((e) => e.date >= monthStartStr)
          .reduce((b, e) => b + e.time_hours, 0);
      }, 0);
      const blendedRate = totalHours > 0 ? totalMtd / totalHours : null;

      clear(summaryEl);
      summaryEl.appendChild(statTile('Active streams', String(active.length), `${killed.length} killed`));
      summaryEl.appendChild(statTile('MTD revenue',    fmt$(totalMtd),         'target $1,000/mo'));
      summaryEl.appendChild(statTile('MTD hours',      fmtH(totalHours),       `${active.length} active streams`));
      summaryEl.appendChild(statTile('Blended $/hr',   blendedRate === null ? '—' : fmt$(blendedRate), 'across all streams'));

      clear(tbodyEl);
      for (const s of data.streams) {
        const m = metricsFor(s);
        const a = actionFor(s, m);

        const trajCell = el('td', { class: 'num' });
        if (s.status === 'killed') {
          trajCell.textContent = '—';
        } else if (m.projected) {
          trajCell.appendChild(el('span', {
            class: 'traj-projected',
            text: `${fmt$(m.trajectory)} (proj. day ${m.daysActive})`,
          }));
        } else {
          trajCell.textContent = fmt$(m.trajectory);
        }

        const row = el('tr', null,
          el('td', null,
            el('div', { class: 'stream-name', text: s.name }),
            el('div', { class: 'stream-id',   text: s.id })
          ),
          el('td', null, el('span', { class: `badge ${s.status}`, text: s.status })),
          el('td', { class: 'num', text: fmt$(m.mtdIncome) }),
          el('td', { class: 'num', text: fmtH(m.mtdHours) }),
          el('td', { class: 'num', text: m.dollarPerHour === null ? '—' : fmt$(m.dollarPerHour) }),
          trajCell,
          el('td', null, el('span', { class: `action ${a.cls}`, text: a.label }))
        );
        tbodyEl.appendChild(row);
      }
      tableEl.hidden = false;
    }

    loadLedger()
      .then(render)
      .catch((e) => {
        subtitleEl.textContent = 'Failed to load.';
        errEl.hidden = false;
        errEl.textContent = e.message;
      });
  </script>
</body>
</html>
